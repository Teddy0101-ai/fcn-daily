<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>热门选品</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-inner">
        <h1 id="site-title">热门选品</h1>
      </div>
    </header>

    <main class="main-card">
      <div class="toolbar">
        <div class="tabs">
          <button class="tab-btn active" data-tab="highlight">今日重点</button>
          <button class="tab-btn" data-tab="usd">USD</button>
          <button class="tab-btn" data-tab="hkd">HKD</button>
        </div>

        <button class="share-btn" id="share-btn">分享</button>
      </div>

      <div class="list-head">
        <div class="head-name">挂钩标的</div>
        <div class="head-ko">敲出价格</div>
        <div class="head-strike">执行价格</div>
        <div class="head-tenor">期限</div>
        <div class="head-coupon">票息(年化)</div>
        <div class="head-detail"></div>
      </div>

      <div id="product-list" class="product-list"></div>

      <div class="disclaimer" id="disclaimer">
        数据截至2026/04/09，本页报价仅供参考，欲知详情可联系相关工作人员。
      </div>
    </main>

    <section class="advisor-card">
      <div class="advisor-left">
        <div class="avatar-placeholder">点击此处<br>上传个人头像</div>
        <div class="advisor-name" id="advisor-name">Ryan Yi 易俊融</div>
      </div>

      <div class="advisor-right">
        <div class="qr-box">
          <img id="advisor-qr" src="assets/qr.png" alt="咨询申购二维码" />
        </div>
        <div class="qr-text">长按扫码 咨询申购</div>
      </div>
    </section>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
